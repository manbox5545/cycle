<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Explorer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

#planetName{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:32px;
    font-weight:bold;
    text-shadow:0 0 15px cyan;
    pointer-events:none;
}

#zoomText{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
}

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    width:30px;
    height:30px;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

#crosshair::before,
#crosshair::after{
    content:'';
    position:absolute;
    background:white;
}

#crosshair::before{
    width:30px;
    height:2px;
    top:14px;
    left:0;
}

#crosshair::after{
    width:2px;
    height:30px;
    left:14px;
    top:0;
}
#scope{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:80vmin;
height:80vmin;
border-radius:50%;
border:4px solid rgba(255,255,255,.6);
box-shadow:0 0 0 9999px rgba(0,0,0,.75);
pointer-events:none;
}
</style>
</head>
<body>

<div id="planetName"></div>
<div id="zoomText">Mouse Wheel = Telescope Zoom</div>
<div id="crosshair"></div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.170.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.set(0,25,180);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();


const textures = {
sun:"https://threejs.org/examples/textures/planets/sun.jpg",
mercury:"https://threejs.org/examples/textures/planets/mercury.jpg",
venus:"https://threejs.org/examples/textures/planets/venus.jpg",
earth:"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
mars:"https://threejs.org/examples/textures/planets/mars_1k_color.jpg",
jupiter:"https://threejs.org/examples/textures/planets/jupiter.jpg",
saturn:"https://threejs.org/examples/textures/planets/saturn.jpg",
uranus:"https://threejs.org/examples/textures/planets/uranus.jpg",
neptune:"https://threejs.org/examples/textures/planets/neptune.jpg"
};

let yaw = 0;
let pitch = 0;


document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", (e) => {

    if(document.pointerLockElement !== document.body) return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -Math.PI/2,
        Math.min(Math.PI/2, pitch)
    );

    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

});

const starsGeometry = new THREE.BufferGeometry();
const starsCount = 12000;

const starsVertices = [];

for(let i=0;i<starsCount;i++){

    starsVertices.push(
        (Math.random()-0.5)*4000,
        (Math.random()-0.5)*4000,
        (Math.random()-0.5)*4000
    );
}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starsVertices,3)
);

const starsMaterial = new THREE.PointsMaterial({
size:1.5
});

const stars = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

for(let i=0;i<40;i++){

    const cloud = new THREE.Mesh(

        new THREE.SphereGeometry(

            80 +

            Math.random()*120,

            8,

            8

        ),

        new THREE.MeshBasicMaterial({

            color:[

                0xff44aa,
                0x44aaff,
                0xaa44ff,
                0x44ffcc

            ][

                Math.floor(
                    Math.random()*4
                )

            ],

            transparent:true,

            opacity:0.05

        })

    );

    cloud.position.set(

        (Math.random()-0.5)*3000,

        (Math.random()-0.5)*3000,

        (Math.random()-0.5)*3000

    );

    scene.add(cloud);

}

const ambient = new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambient);

const sunLight = new THREE.PointLight(
0xffffff,
6,
3000
);
const galaxies = [];

const galaxyNames = [
"Milky Way",
"Andromeda",
"Triangulum",
"Whirlpool",
"Sombrero",
"Pinwheel",
"Cartwheel",
"Black Eye"
];
for(let i=0;i<8;i++){

    const galaxy = new THREE.Mesh(
        new THREE.SphereGeometry(5,8,8),
        new THREE.MeshBasicMaterial({
            color:0xffffcc
        })
    );

    galaxy.position.set(
        (Math.random()-0.5)*3000,
        (Math.random()-0.5)*3000,
        (Math.random()-0.5)*3000
    );

galaxy.userData = {
    name: galaxyNames[i % galaxyNames.length],
    isGalaxy:true,
    loaded:false
};

    scene.add(galaxy);
    galaxies.push(galaxy);
}

function createGalaxyView(galaxy){


    if(galaxy.userData.loaded) return;

    galaxy.userData.loaded = true;

    const blackHole = new THREE.Mesh(
        new THREE.SphereGeometry(3,32,32),
        new THREE.MeshBasicMaterial({
            color:0x000000
        })
    );

    blackHole.position.copy(galaxy.position);

    scene.add(blackHole);

    const galaxyObjects = [blackHole];

    for(let i=0;i<500;i++){

        const star = new THREE.Mesh(
            new THREE.SphereGeometry(0.15,4,4),
            new THREE.MeshBasicMaterial({
                color:0xffffff
            })
        );

        const angle = Math.random()*Math.PI*2;
        const radius = Math.random()*40;

        star.position.set(
            galaxy.position.x + Math.cos(angle)*radius,
            galaxy.position.y + (Math.random()-0.5)*2,
            galaxy.position.z + Math.sin(angle)*radius
        );

        star.userData = {
            orbitCenter: galaxy.position,
            angle,
            radius
        };

        scene.add(star);

        galaxyObjects.push(star);

        window.galaxyStars ??= [];
        window.galaxyStars.push(star);
        galaxies.push(star);
    }

    galaxy.userData.galaxyObjects = galaxyObjects;

}

function destroyGalaxyView(galaxy){

    if(!galaxy.userData.loaded) return;

    galaxy.userData.loaded = false;

    if(!galaxy.userData.galaxyObjects) return;

    galaxy.userData.galaxyObjects.forEach(obj=>{

        scene.remove(obj);

        const idx = window.galaxyStars?.indexOf(obj);

        if(idx > -1){
            window.galaxyStars.splice(idx,1);
        }

        if(obj.geometry) obj.geometry.dispose();

        if(obj.material){
            obj.material.dispose();
        }

    });

    galaxy.userData.galaxyObjects = [];

}


scene.add(sunLight);

const planets = [];
function createPlanet(name,size,color){

    const geometry =
    new THREE.SphereGeometry(size,64,64);

    const material =
    new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.8,
        metalness: 0.1
    });

    const planet =
    new THREE.Mesh(
        geometry,
        material
    );

    planet.position.set(
        (Math.random()-0.5)*800,
        (Math.random()-0.5)*400,
        (Math.random()-0.5)*800
    );

    planet.userData = { name };

    scene.add(planet);
    planets.push(planet);

    return planet;
}
const sun = new THREE.Mesh(
    new THREE.SphereGeometry(12,64,64),
    new THREE.MeshBasicMaterial({
        color:0xffcc33
    })
);

scene.add(sun);
createPlanet("Mercury",2,0x888888);
createPlanet("Venus",3,0xd9b38c);
createPlanet("Earth",3.2,0x3399ff);
const mars = createPlanet(
    "Mars",
    2.5,
    0xcc4422
);
const jupiter = createPlanet(
    "Jupiter",
    8,
    0xd2b48c
);
const saturn = createPlanet(
    "Saturn",
    7,
    0xe6d690
);

const saturnRing = new THREE.Mesh(

    new THREE.RingGeometry(
        10,
        16,
        64
    ),

    new THREE.MeshBasicMaterial({
        color:0xd6c28a,
        side:THREE.DoubleSide,
        transparent:true,
        opacity:0.8
    })

);

saturnRing.rotation.x = Math.PI/2.4;

saturn.add(saturnRing);
createPlanet("Uranus",5,0x99ffff);
createPlanet("Neptune",5,0x3366ff);

const kuiperGeo =
new THREE.BufferGeometry();

const kuiperVertices = [];

for(let i=0;i<5000;i++){

    const angle =
    Math.random()*Math.PI*2;

    const radius =
    1000 +
    Math.random()*300;

    kuiperVertices.push(

        Math.cos(angle)
        *
        radius,

        (Math.random()-0.5)*20,

        Math.sin(angle)
        *
        radius

    );

}

kuiperGeo.setAttribute(

    "position",

    new THREE.Float32BufferAttribute(
        kuiperVertices,
        3
    )

);

const kuiper = new THREE.Points(

    kuiperGeo,

    new THREE.PointsMaterial({

        color:0xcccccc,

        size:1

    })

);

scene.add(kuiper);

const jupiterMoons = [];

for(let i=0;i<4;i++){

    const moon = new THREE.Mesh(

        new THREE.SphereGeometry(
            0.7,
            16,
            16
        ),

        new THREE.MeshStandardMaterial({
            color:0xffffff
        })

    );

    moon.userData = {

        angle:
        Math.random()*Math.PI*2,

        distance:
        12 + i*4

    };

    scene.add(moon);

    jupiterMoons.push(moon);

}

const marsMoon = new THREE.Mesh(

    new THREE.SphereGeometry(
        0.5,
        16,
        16
    ),

    new THREE.MeshStandardMaterial({
        color:0xaaaaaa
    })

);

scene.add(marsMoon);

marsMoon.userData = {

    parent:mars,

    angle:0,

    distance:6

};

const raycaster = new THREE.Raycaster();
const center = new THREE.Vector2(0,0);

const planetName =
document.getElementById("planetName");

window.addEventListener("wheel",(e)=>{

    camera.fov += e.deltaY * 0.02;

    camera.fov = THREE.MathUtils.clamp(
        camera.fov,
        10,
        80
    );

    camera.updateProjectionMatrix();

});



let mouseDown = false;

window.addEventListener("mousedown",()=>{
mouseDown = true;
});

window.addEventListener("mouseup",()=>{
mouseDown = false;
});

window.addEventListener("mousemove",(e)=>{

if(!mouseDown) return;

camera.rotation.y -= e.movementX * 0.002;
camera.rotation.x -= e.movementY * 0.002;

});

const keys = {};
let targetFov = 60;
let lastOkTime = 0;

let zoomLevel = 1;
const maxZoomLevel = 50;

function applyZoom(){

    targetFov = 60 / Math.pow(1.25, zoomLevel - 1);

    targetFov = THREE.MathUtils.clamp(
        targetFov,
        1,
        60
    );
}

const moveSpeed = 0.0025;



window.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

window.addEventListener("keydown",(e)=>{
    if(e.key === "Enter"){
        window.location.href = "ship.html";
    }
});

window.addEventListener("keydown",(e)=>{

    keys[e.key] = true;

    if(e.repeat) return;

    if(e.key === "Enter"){

        const now = Date.now();

        if(now - lastOkTime < 400){

            // DOUBLE OK = ZOOM OUT
            targetFov += 10;

        }else{

            // SINGLE OK = ZOOM IN
            targetFov -= 10;
        }

        targetFov = THREE.MathUtils.clamp(
            targetFov,
            5,
            80
        );

        lastOkTime = now;
    }
});
window.addEventListener("keydown",(e)=>{

    if(!zoomMode.checked) return;

    if(e.repeat) return;

    if(e.key === "ArrowUp"){

        zoomLevel++;

        zoomLevel = Math.min(
            zoomLevel,
            30
        );

        targetFov = 60 / zoomLevel;
    }

    if(e.key === "ArrowDown"){

        zoomLevel--;

        zoomLevel = Math.max(
            zoomLevel,
            1
        );

        targetFov = 60 / zoomLevel;
    }

    document.getElementById("zoomText").textContent =
    "Zoom: " + zoomLevel + "X";
});
function animate(){

requestAnimationFrame(animate);



camera.fov = THREE.MathUtils.clamp(
    camera.fov,
    0.3,
    80
);

camera.updateProjectionMatrix();

planets.forEach(planet=>{
    planet.rotation.y += 0.01;
});

marsMoon.userData.angle += 0.02;

marsMoon.position.copy(
    mars.position
);

marsMoon.position.x +=
Math.cos(
    marsMoon.userData.angle
)
*
marsMoon.userData.distance;

marsMoon.position.z +=
Math.sin(
    marsMoon.userData.angle
)
*
marsMoon.userData.distance;
raycaster.setFromCamera(
center,
camera
);

const intersects =
raycaster.intersectObjects([
...planets,
...galaxies
]);

if(intersects.length){

const obj = intersects[0].object;

planetName.textContent =
obj.userData.name || "Unknown Star";

if(
obj.userData.isGalaxy &&
camera.fov < 3
){
    createGalaxyView(obj);
}

}else{

planetName.textContent = "";

}

if(window.galaxyStars){

window.galaxyStars.forEach(star=>{

    star.userData.angle += 0.01;

    star.position.x =
        star.userData.orbitCenter.x +
        Math.cos(star.userData.angle) *
        star.userData.radius;

    star.position.z =
        star.userData.orbitCenter.z +
        Math.sin(star.userData.angle) *
        star.userData.radius;

});

}

galaxies.forEach(galaxy=>{

    if(
        galaxy.userData &&
        galaxy.userData.isGalaxy &&
        galaxy.userData.loaded &&
        camera.fov > 6
    ){
        destroyGalaxyView(galaxy);
    }

});

jupiterMoons.forEach(moon=>{

    moon.userData.angle += 0.01;

    moon.position.copy(
        jupiter.position
    );

    moon.position.x +=
    Math.cos(
        moon.userData.angle
    )
    *
    moon.userData.distance;

    moon.position.z +=
    Math.sin(
        moon.userData.angle
    )
    *
    moon.userData.distance;

});



if(!zoomMode.checked){

    if(keys["ArrowLeft"])
        yaw += moveSpeed;

    if(keys["ArrowRight"])
        yaw -= moveSpeed;

    if(keys["ArrowUp"])
        pitch += moveSpeed;

    if(keys["ArrowDown"])
        pitch -= moveSpeed;

}else{

    if(keys["ArrowLeft"])
        yaw += moveSpeed * 0.25;

    if(keys["ArrowRight"])
        yaw -= moveSpeed * 0.25;
}

pitch = THREE.MathUtils.clamp(
    pitch,
    -Math.PI/2,
    Math.PI/2
);

camera.rotation.order = "YXZ";
camera.rotation.y = yaw;
camera.rotation.x = pitch;

camera.fov += (targetFov - camera.fov) * 0.03;
camera.updateProjectionMatrix();

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

<div id="scope"></div>

<div id="tvMode">
<label>
<input type="checkbox" id="zoomMode">
 D-Pad Zoom Mode
</label>
</div>

<style>
#tvMode{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,.7);
color:white;
padding:10px;
border-radius:10px;
z-index:1000;
}
</style>
<script>
window.zoomMode =
document.getElementById("zoomMode");
</script>
</body>
</html>
